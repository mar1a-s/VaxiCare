<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recordatorios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>

    <!-- Barra superior de navegación -->
    <header class="navbar">

      <!-- Logo y nombre de la página -->
      <a href="../index.html" class="brand">

        <!-- Icono del logo -->
        <i class="fa-solid fa-shield-heart"></i>

        <!-- Nombre del sistema -->
        <span>VaxiCare</span>
      </a>

      <!-- Menú con los enlaces principales -->
      <nav class="nav-links">

        <!-- Enlace al inicio -->
        <a href="../index.html">Inicio</a>

        <!-- Enlace al historial -->
        <a href="historial.html">Historial</a>

        <!-- Página actual marcada con active -->
        <a class="active" href="recordatorios.html">Recordatorios</a>

        <!-- Enlace a vacunas -->
        <a href="vacunas.html">Vacunas</a>

        <!-- Enlace a contacto -->
        <a href="contacto.html">Contacto</a>
      </nav>

      <!-- Botón para cambiar entre modo claro y oscuro -->
      <button class="theme-btn" id="themeBtn">

        <!-- Icono del botón de modo -->
        <i class="fa-solid fa-moon"></i>

        <!-- Texto del botón -->
        <span> Modo</span>
      </button>
    </header>

    <!-- Contenido principal de la página -->
    <main class="main-layout page-layout">

      <!-- Tarjeta donde se muestran los recordatorios -->
      <section class="glass-card section-block">

        <!-- Etiqueta pequeña de la sección -->
        <span class="tag">

          <!-- Icono de campana -->
          <i class="fa-solid fa-bell"></i>

          Seguimiento
        </span>

        <!-- Título principal -->
        <h1 class="page-title">
          Recordatorios de próximas dosis
        </h1>

        <!--
          Este contenedor está vacío porque las tarjetas
          de recordatorios se agregan desde JavaScript.
        -->
        <div class="reminders-grid" id="remindersContainer"></div>
      </section>
    </main>

    <!-- Botón flotante para ir a soporte -->
    <a href="contacto.html" class="support-btn">

      <!-- Icono de soporte -->
      <i class="fa-solid fa-headset"></i>

      Soporte
    </a>

    <!-- Pie de página -->
    <footer>

      <p>
        Proyecto académico · Cartilla de Vacunación Digital · PROPOINT
      </p>
    </footer>

    <!-- Archivo donde se encuentran los datos de ejemplo -->
    <script src="../js/data.js"></script>

    <!-- Archivo JS general del proyecto -->
    <script src="../js/app.js"></script>

    <!--
      Archivo encargado de crear los recordatorios
      y mostrarlos dentro de remindersContainer.
    -->
    <script src="../js/recordatorios.js"></script>

  </body>
</html>
